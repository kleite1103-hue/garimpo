<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Garimpo · Efeito Vendas</title>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--cream:#F6F3EC;--paper:#FFF;--ink:#16140F;--muted:#8A857A;--line:#E7E2D6;--orange:#FF4D1C;--soft:#FBF9F4;--green:#1F7A4D;--gold:#C98A2B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"General Sans",system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
/* LOGIN */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.loginbox{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:38px 32px;max-width:390px;width:100%}
.logo{font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
.logo b{display:block;font-size:30px;text-transform:none;color:var(--ink);font-style:italic;margin-top:4px}
.logo b i{color:var(--orange);font-style:normal}
.loginbox p{font-size:14px;color:var(--muted);margin:14px 0 22px;line-height:1.5}
.field{margin-bottom:13px}
.field label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px}
.field input{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font-family:inherit;font-size:15px;outline:0}
.field input:focus{border-color:var(--orange)}
.btn{width:100%;background:var(--orange);color:#fff;border:0;border-radius:12px;padding:15px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{filter:brightness(1.05)}
.guest{display:block;text-align:center;margin-top:16px;font-size:13.5px;color:var(--muted);cursor:pointer;text-decoration:underline}
.err{background:#FDECEA;color:#B5563C;font-size:13px;padding:10px 12px;border-radius:10px;margin-bottom:14px;display:none}
/* APP */
.app{display:none;grid-template-columns:248px 1fr;min-height:100vh}
.app.on{display:grid}
.side{background:var(--paper);border-right:1px solid var(--line);padding:26px 20px;position:sticky;top:0;height:100vh;overflow:auto}
.modesw{display:flex;gap:5px;background:var(--soft);border-radius:12px;padding:4px;margin:24px 0 8px}
.modesw button{flex:1;border:0;background:transparent;font-family:inherit;font-size:13px;font-weight:600;padding:9px;border-radius:9px;cursor:pointer;color:var(--muted)}
.modesw button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.modesw button.hidden{display:none}
.navlabel{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#B6AE9E;font-weight:600;margin:26px 0 11px}
.cat{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:10px;font-size:14px;font-weight:600;background:var(--soft)}
.userbox{margin-top:26px;padding:13px;border:1px solid var(--line);border-radius:12px;font-size:12.5px}
.userbox .role{font-weight:600;color:var(--ink)}.userbox .em{color:var(--muted);margin-top:3px;word-break:break-all}
.logout{margin-top:10px;font-size:12.5px;color:var(--orange);cursor:pointer;font-weight:600}
.main{padding:30px 36px 70px;max-width:1200px}
.bar{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.title{font-size:30px;font-weight:600}
.fx{font-size:12px;color:var(--muted);text-align:right;line-height:1.6}.fx b{color:var(--ink);font-weight:600}
.search{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px 15px;margin:20px 0 8px;max-width:430px}
.search input{border:0;outline:0;font-family:inherit;font-size:15px;width:100%;background:transparent}
.count{font-size:12.5px;color:var(--muted);margin:12px 2px 18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:.16s}
.card:hover{transform:translateY(-3px);box-shadow:0 14px 30px -16px rgba(20,18,12,.25)}
.thumb{aspect-ratio:1;overflow:hidden;background:var(--soft)}.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.cb{padding:12px 13px 14px;display:flex;flex-direction:column;gap:7px;flex:1}
.subtag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);font-weight:600}
.name{font-size:12.5px;line-height:1.34;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:34px}
.brl{font-size:19px;font-weight:600;margin-top:auto}.range{font-size:11px;color:var(--muted)}.rmb{font-size:10.5px;color:#B6AE9E}
.vf{display:flex;align-items:center;gap:5px;margin-top:7px;padding-top:8px;border-top:1px dashed var(--line);font-size:10.5px;color:var(--green);font-weight:600}
.scard{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;gap:9px}
.scard:hover{transform:translateY(-3px);box-shadow:0 14px 30px -16px rgba(20,18,12,.25)}
.srank{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--gold);background:#FBF1DF;border-radius:7px;padding:3px 8px;align-self:flex-start}
.sname{font-size:15px;font-weight:600;line-height:1.25}
.sbadges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:7px}
.badge.we{background:#E8F8EF;color:var(--green)}.badge.wa{background:#E6F4F1;color:#0A7A6B}.badge.yr{background:var(--soft);color:var(--muted)}
.detail{display:none}.detail.on{display:block}
.listing.hidden{display:none}
.back{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;margin-bottom:22px}
.dwrap{display:grid;grid-template-columns:1fr 1fr;gap:42px}@media(max-width:780px){.dwrap{grid-template-columns:1fr;gap:24px}}
.gmain{aspect-ratio:1;border-radius:18px;overflow:hidden;border:1px solid var(--line)}.gmain img{width:100%;height:100%;object-fit:cover}
.dcat{font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--orange);font-weight:600}
.dname{font-size:22px;font-weight:600;line-height:1.3;margin-top:8px}
.dp{margin:20px 0 2px}.dp .big{font-size:34px;font-weight:600}.dp .rg{font-size:13px;color:var(--muted);margin-top:3px}.dp .or{font-size:12px;color:#B6AE9E;margin-top:5px}
.specs{margin:20px 0;border-top:1px solid var(--line)}
.sp{display:flex;justify-content:space-between;padding:11px 2px;border-bottom:1px solid var(--line);font-size:13.5px}
.sp span:first-child{color:var(--muted)}.sp span:last-child{font-weight:500;text-align:right;max-width:62%}
.supbox{margin:18px 0;background:#F1F7F3;border:1px solid #CDE6D9;border-radius:14px;padding:16px}
.supbox .sl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);font-weight:700;margin-bottom:12px}
.supbox .sr{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:6px 0;border-bottom:1px solid #DCEDE3}
.supbox .sr:last-of-type{border-bottom:0}.supbox .sr span:first-child{color:#6B9A82}.supbox .sr span:last-child{font-weight:600;text-align:right;word-break:break-word}
.btnrow{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
.minibtn{flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;gap:6px;border:0;border-radius:11px;padding:11px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:none}
.minibtn.chat{background:var(--green);color:#fff}.minibtn.we{background:#07C160;color:#fff}.minibtn.map{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
.cta{display:block;width:100%;background:var(--orange);color:#fff;border:0;border-radius:14px;padding:16px;font-family:inherit;font-size:15.5px;font-weight:600;cursor:pointer;margin-top:6px}
.cta2{display:block;width:100%;background:transparent;border:1px solid var(--line);border-radius:14px;padding:13px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.5}
.loading{padding:60px;text-align:center;color:var(--muted)}
@media(max-width:680px){.app.on{grid-template-columns:1fr}.side{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}}
</style></head><body>

<div class="login" id="login">
  <div class="loginbox">
    <div class="logo">Efeito Vendas<b>Garimpo<i>.</i></b></div>
    <p>Catálogo de importação direto de Yiwu, com preço de chegada no Brasil já calculado.</p>
    <div class="err" id="err"></div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="seu@email.com"/></div>
    <div class="field"><label>Senha</label><input id="pw" type="password" placeholder="••••••••"/></div>
    <button class="btn" id="loginbtn">Entrar</button>
    <span class="guest" id="guest">Ver o catálogo como visitante</span>
  </div>
</div>

<div class="app" id="app">
 <aside class="side">
   <div class="logo">Efeito Vendas<b>Garimpo<i>.</i></b></div>
   <div class="modesw">
     <button id="mP" class="on" onclick="setMode('prod')">Produtos</button>
     <button id="mS" class="hidden" onclick="setMode('supp')">Fornecedores</button>
   </div>
   <div class="navlabel">Categoria</div>
   <div class="cat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg><span id="catname">Distrito 1</span></div>
   <div class="userbox">
     <div class="role" id="urole">Visitante</div>
     <div class="em" id="uemail"></div>
     <div class="logout" id="logout" style="display:none">Sair</div>
   </div>
 </aside>
 <main class="main">
  <div class="listing" id="listing">
   <div class="bar"><div class="title" id="ttl">Produtos</div>
     <div class="fx">Câmbio <b id="fxlabel">1 RMB = R$ 0,79</b><br>Preço Brasil = <b>RMB × 2</b> · faixa ±10%</div></div>
   <div class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A857A" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg><input id="q" placeholder="Buscar..."/></div>
   <div class="count" id="count"></div>
   <div id="listroot"><div class="loading">Carregando catálogo...</div></div>
  </div>
  <div class="detail" id="detail"></div>
 </main>
</div>

<script>
const SB_URL="https://zosofrtgqvmxookymwmx.supabase.co";
const SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpvc29mcnRncXZteG9va3ltd214Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTQ2MjYsImV4cCI6MjA5ODU3MDYyNn0.LL5f90xMrjE9YNI9c7Ra_KFxWN5Hwxu0WRgR4kX75vg";
const sb=supabase.createClient(SB_URL,SB_ANON);
let mode='prod', role='visitante', PROD=[], SUPP={}, curDetail=null;
const $=id=>document.getElementById(id);
function brl(n){return (n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

async function boot(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(session){await afterLogin(session);return;}
  }catch(e){}
  // modo teste: entra direto no catalogo como visitante
  role='visitante'; enterApp();
}
$('loginbtn').onclick=async()=>{
  $('err').style.display='none';
  const {data,error}=await sb.auth.signInWithPassword({email:$('email').value,password:$('pw').value});
  if(error){$('err').textContent="Não foi possível entrar: "+error.message;$('err').style.display='block';return;}
  await afterLogin(data.session);
};
$('guest').onclick=async()=>{ role='visitante'; enterApp(); };
$('logout').onclick=async()=>{ await sb.auth.signOut(); location.reload(); };

async function afterLogin(session){
  const {data:perfil}=await sb.from('perfis').select('papel,nome').eq('id',session.user.id).single();
  role=(perfil&&perfil.papel)||'aluno';
  $('uemail').textContent=session.user.email;
  $('logout').style.display='block';
  enterApp();
}
function enterApp(){
  $('login').style.display='none'; $('app').classList.add('on');
  $('urole').textContent = role==='funcionario'?'Equipe · acesso total':(role==='aluno'?'Aluno':'Visitante');
  if(role==='funcionario'){ $('mS').classList.remove('hidden'); }
  loadData();
}

async function loadData(){
  // produtos (todos podem ler)
  const {data:prods}=await sb.from('produtos').select('*').limit(2000);
  PROD=prods||[];
  // fornecedores: funcionario le tabela cheia; senao, view publica (sem nome)
  if(role==='funcionario'){
    const {data:sup}=await sb.from('fornecedores').select('*').limit(3000);
    (sup||[]).forEach(s=>SUPP[s.code]=s);
  } else {
    const {data:sup}=await sb.from('fornecedores_publico').select('*').limit(3000);
    (sup||[]).forEach(s=>SUPP[s.code]=s);
  }
  apply();
}
function setMode(m){mode=m;
  $('mP').classList.toggle('on',m==='prod');$('mS').classList.toggle('on',m==='supp');
  $('ttl').textContent=m==='prod'?'Produtos':'Fornecedores';
  $('q').placeholder=m==='prod'?'Buscar produto...':'Buscar fornecedor...';
  closeD();$('q').value='';apply();
}
function apply(){const t=$('q').value.trim().toLowerCase();
  if(mode==='prod'){renderProducts(PROD.filter(p=>!t||(p.name||'').toLowerCase().includes(t)));}
  else{renderSuppliers(Object.values(SUPP).filter(s=>!t||(s.name||'').toLowerCase().includes(t)).sort((a,b)=>(b.score||0)-(a.score||0)));}
}
function renderProducts(L){
  $('count').textContent=L.length+' produtos';$('listroot').className='grid';
  $('listroot').innerHTML=L.map(p=>{const s=SUPP[p.shop_code]||{};return `
   <article class="card" onclick="openProd('${p.id}')">
     <div class="thumb"><img loading="lazy" src="${(p.imgs&&p.imgs[0])||''}"></div>
     <div class="cb"><div class="subtag">${p.subcategoria||'Distrito 1'}</div><div class="name">${p.name||''}</div>
       <div class="brl">R$ ${brl(p.brl)}</div><div class="range">R$ ${brl(p.brl_min)} a R$ ${brl(p.brl_max)}</div><div class="rmb">origem ¥ ${p.rmb}</div>
       <div class="vf"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1F7A4D" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>Fornecedor verificado${s.years?' · '+s.years+' anos':''}</div>
     </div></article>`}).join('')||'<div class="loading">Nenhum produto.</div>';
}
function renderSuppliers(L){
  $('count').textContent=L.length+' fornecedores';$('listroot').className='grid';
  $('listroot').innerHTML=L.map((s,i)=>`
   <article class="scard" onclick="openSupp('${s.code}')">
     ${i<3?`<span class="srank"><svg width="11" height="11" viewBox="0 0 24 24" fill="#C98A2B"><path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg>Top ${i+1}</span>`:''}
     <div class="sname">${s.name||('Fornecedor #'+s.code)}</div>
     <div class="sbadges"><span class="badge yr">${s.years||'?'} anos</span><span class="badge yr">${s.product_count||0} produtos</span>${s.wechat?'<span class="badge we">WeChat</span>':''}${s.whatsapp?'<span class="badge wa">WhatsApp</span>':''}</div>
   </article>`).join('')||'<div class="loading">Nenhum fornecedor.</div>';
}
function openProd(id){const p=PROD.find(x=>x.id===id);const s=SUPP[p.shop_code]||{};curDetail=id;
  $('detail').innerHTML=`<div class="back" onclick="closeD()">← Voltar</div><div class="dwrap">
    <div><div class="gmain"><img src="${(p.imgs&&p.imgs[0])||''}"></div></div>
    <div><div class="dcat">${p.subcategoria||'Distrito 1'} · Yiwu</div><div class="dname">${p.name||''}</div>
      <div class="dp"><div class="big">R$ ${brl(p.brl)}</div><div class="rg">faixa R$ ${brl(p.brl_min)} a R$ ${brl(p.brl_max)}</div><div class="or">origem ¥ ${p.rmb} · ×2</div></div>
      <div class="specs"><div class="sp"><span>Origem</span><span>Distrito 1, Yiwu</span></div><div class="sp"><span>Fornecedor</span><span>Verificado${s.years?' · '+s.years+' anos':''}</span></div><div class="sp"><span>Preço origem</span><span>¥ ${p.rmb}</span></div></div>
      ${role==='funcionario'?supBox(s,p.chat_url):''}
      <button class="cta" onclick="alert('Fazer pedido: fluxo de importação com a Efeito Vendas.')">Fazer pedido</button>
      <button class="cta2" onclick="alert('Falar com a Efeito Vendas no WhatsApp.')">Falar com a Efeito Vendas</button>
      <div class="note">A Efeito Vendas cuida do fornecedor, da negociação e da importação.</div>
    </div></div>`;
  $('listing').classList.add('hidden');$('detail').classList.add('on');scrollTo(0,0);
}
function supBox(s,chat){if(!s||!s.code)return '';
  const we=s.wechat?`<button class="minibtn we" onclick="copyWe('${s.wechat}','${(s.name||'').replace(/'/g,'')}')">Copiar WeChat</button>`:'';
  const ch=chat?`<a class="minibtn chat" href="${chat}" target="_blank">Chat Yiwugo</a>`:'';
  const mp=s.map_url?`<a class="minibtn map" href="${s.map_url}" target="_blank">Mapa</a>`:'';
  return `<div class="supbox"><div class="sl">Fornecedor · só equipe</div>
    <div class="sr"><span>Loja</span><span>${s.name||'—'}</span></div>
    <div class="sr"><span>Contato</span><span>${s.contact||'—'}</span></div>
    <div class="sr"><span>Anos</span><span>${s.years||'—'}</span></div>
    <div class="sr"><span>Telefone</span><span>${s.mobile||'—'}</span></div>
    <div class="sr"><span>WhatsApp</span><span>${s.whatsapp||'—'}</span></div>
    <div class="sr"><span>WeChat</span><span>${s.wechat||'não informado'}</span></div>
    <div class="sr"><span>Email</span><span>${s.email||'—'}</span></div>
    <div class="sr"><span>Endereço</span><span>${s.address||'—'}</span></div>
    <div class="btnrow">${ch}${we}${mp}</div></div>`;
}
function openSupp(code){const s=SUPP[code];const prods=PROD.filter(p=>p.shop_code===code);
  $('detail').innerHTML=`<div class="back" onclick="closeD()">← Voltar</div>
   <div class="dcat">Fornecedor · Distrito 1</div><div class="dname">${s.name||('Fornecedor #'+code)}</div>
   <div class="sbadges" style="margin:12px 0"><span class="badge yr">${s.years||'?'} anos</span><span class="badge yr">${s.product_count||0} produtos</span>${s.wechat?'<span class="badge we">WeChat</span>':''}${s.whatsapp?'<span class="badge wa">WhatsApp</span>':''}</div>
   ${role==='funcionario'?supBox(s,prods[0]?prods[0].chat_url:''):'<div class="note" style="text-align:left">Contatos do fornecedor visíveis apenas para a equipe.</div>'}
   ${prods.length?`<div class="dcat" style="margin-top:24px">Produtos desta loja</div><div class="grid" style="margin-top:14px">${prods.map(p=>`<article class="card" onclick="openProd('${p.id}')"><div class="thumb"><img src="${(p.imgs&&p.imgs[0])||''}"></div><div class="cb"><div class="name">${p.name}</div><div class="brl">R$ ${brl(p.brl)}</div></div></article>`).join('')}</div>`:''}`;
  $('listing').classList.add('hidden');$('detail').classList.add('on');scrollTo(0,0);
}
function copyWe(w,n){const txt=`WeChat: ${w} | Loja: ${n} | Categoria: Distrito 1`;navigator.clipboard&&navigator.clipboard.writeText(txt);alert('Copiado:\n\n'+txt);}
function closeD(){$('listing').classList.remove('hidden');$('detail').classList.remove('on');scrollTo(0,0);}
$('q').addEventListener('input',apply);
boot();
</script>
</body></html>
